name: Anti4D4V
version: ${version}
main: com.tendoarisu.anti4D4V.Anti4D4V
api-version: '1.20'
folia-supported: true
description: 防止特定前缀、ID 或 IP 段的玩家进入服务器或进入后刷屏
authors: [ TendoArisu ]

commands:
  anti4d4v:
    description: 主命令
    permission: anti4d4v.admin
    usage: /anti4d4v <reload|packetloss|iprange>

permissions:
  anti4d4v.admin:
    description: 允许管理 Anti4D4V
    default: op
  anti4d4v.notify:
    description: 接收 Anti4D4V 拦截提示
    default: true
